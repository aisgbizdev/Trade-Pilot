openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI Trading Assistant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: analyses
    description: Analysis operations
  - name: notifications
    description: Notification operations
  - name: admin
    description: Admin operations
  - name: superadmin
    description: Super admin operations
  - name: events
    description: Lightweight client telemetry events
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password/question:
    post:
      operationId: getForgotPasswordQuestion
      tags: [auth]
      summary: Get security question for email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordQuestionBody"
      responses:
        "200":
          description: Security question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityQuestionResponse"
  /auth/forgot-password/verify:
    post:
      operationId: verifySecurityAnswer
      tags: [auth]
      summary: Verify security answer and get reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifySecurityAnswerBody"
      responses:
        "200":
          description: Answer verified, reset token returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetTokenResponse"
        "401":
          description: Wrong answer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password/reset:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordBody"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/profile:
    patch:
      operationId: updateProfile
      tags: [auth]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/password:
    patch:
      operationId: changePassword
      tags: [auth]
      summary: Change own password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Wrong current password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/security-question:
    patch:
      operationId: changeSecurityQuestion
      tags: [auth]
      summary: Change security question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeSecurityQuestionBody"
      responses:
        "200":
          description: Security question updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyses:
    post:
      operationId: createAnalysis
      tags: [analyses]
      summary: Create new analysis (triggers AI)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnalysisBody"
      responses:
        "201":
          description: Analysis created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: AI service error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listAnalyses
      tags: [analyses]
      summary: List user's analyses with filters
      parameters:
        - name: mode
          in: query
          schema:
            type: string
            enum: [beginner, pro]
        - name: instrument
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: from
          in: query
          description: Filter analyses created on or after this date (ISO 8601)
          schema:
            type: string
            format: date
        - name: to
          in: query
          description: Filter analyses created on or before this date (ISO 8601)
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of analyses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysesList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyses/summary:
    get:
      operationId: getAnalysesSummary
      tags: [analyses]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysesSummary"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyses/outcomes-summary:
    get:
      operationId: getAnalysisOutcomesSummary
      tags: [analyses]
      summary: AI trade-plan outcome roll-up over the last 30 days
      description: >
        Aggregates the after-the-fact outcomes the background resolver has
        written to each analysis (TP1/TP2 hit, SL hit, expired, invalidated,
        or still pending) for the current user over the past 30 days. Drives
        the "AI accuracy" card on the dashboard.
      responses:
        "200":
          description: Outcome summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisOutcomesSummary"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyses/recent-instruments:
    get:
      operationId: getRecentInstruments
      tags: [analyses]
      summary: Get 3 most recently analyzed instruments
      responses:
        "200":
          description: Recent instruments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentInstruments"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyses/quota:
    get:
      operationId: getAnalysisQuota
      tags: [analyses]
      summary: Get current user's analysis quota usage
      responses:
        "200":
          description: Quota usage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisQuota"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyses/personal-analytics:
    get:
      operationId: getPersonalAnalytics
      tags: [analyses]
      summary: Get personal analytics data
      parameters:
        - name: range
          in: query
          description: Time-bucket range for the chart series. `daily` returns the last 7 days, `weekly` the last 7 weeks, `monthly` the last 6 months.
          schema:
            type: string
            enum: [daily, weekly, monthly]
            default: weekly
      responses:
        "200":
          description: Personal analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonalAnalytics"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyses/{id}:
    get:
      operationId: getAnalysis
      tags: [analyses]
      summary: Get single analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyses/{id}/refresh-fundamentals:
    post:
      operationId: refreshFundamentals
      tags: [analyses]
      summary: Re-fetch news + economic calendar for an existing analysis (no AI re-run)
      description: >
        Re-fetches the news headlines and economic-calendar events for the
        analysis's instrument WITHOUT re-running the AI. Persists the fresh
        snapshot on the analyses row (the audit "Fundamental Context" card
        renders from this) and returns a drift report listing which of the
        AI's original `fundamentalCitations` no longer match anything in the
        fresh window. Lets the user sanity-check whether the saved AI thesis
        still rests on a valid fundamental base.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Refreshed fundamental snapshot + drift report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshFundamentalsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Analysis not found or not owned by this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyses/{id}/alerts:
    get:
      operationId: getAnalysisAlerts
      tags: [analyses]
      summary: Get price-alert status for an analysis
      description: >
        Returns whether push alerts are armed on this analysis's AI-generated
        entry / SL / TP levels, and the per-level fire history. Drives the
        "Alerts: ON · N levels armed" indicator on the analysis-detail page.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Alert status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Analysis not found or not owned by this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: armAnalysisAlerts
      tags: [analyses]
      summary: Arm price alerts for an analysis
      description: >
        Arms one push alert per AI level on the preferred trade side. The
        background watcher polls live prices every ~30s and fires the first
        time each level is touched, deep-linking back to this analysis.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Alerts armed; returns the fresh status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Analysis not found or not owned by this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Could not arm (instrument not on live feed, no trade plan, etc)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: cancelAnalysisAlerts
      tags: [analyses]
      summary: Cancel any un-fired price alerts for an analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Alerts cancelled; returns the fresh status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Analysis not found or not owned by this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyses/{id}/feedback:
    post:
      operationId: submitFeedback
      tags: [analyses]
      summary: Submit feedback for analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackBody"
      responses:
        "201":
          description: Feedback submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feedback"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get notifications for current user
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark single notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /push/public-key:
    get:
      operationId: getPushPublicKey
      tags: [push]
      summary: Get the VAPID public key for Web Push subscription
      responses:
        "200":
          description: Public key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushPublicKey"

  /push/subscribe:
    post:
      operationId: subscribePush
      tags: [push]
      summary: Register a Web Push subscription for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushSubscriptionBody"
      responses:
        "200":
          description: Subscription stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /push/unsubscribe:
    delete:
      operationId: unsubscribePush
      tags: [push]
      summary: Remove a Web Push subscription for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushUnsubscribeBody"
      responses:
        "200":
          description: Subscription removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /push/subscription-status:
    get:
      operationId: getPushSubscriptionStatus
      tags: [push]
      summary: Check whether the current user has any active push subscription
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushSubscriptionStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /push/prefs:
    get:
      operationId: getPushPrefs
      tags: [push]
      summary: Get current user's push notification preferences
      responses:
        "200":
          description: Preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushPrefs"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePushPrefs
      tags: [push]
      summary: Update push notification preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushPrefsUpdate"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushPrefs"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /push/test:
    post:
      operationId: sendPushTest
      tags: [push]
      summary: Send a sample push notification to the calling user's subscribed devices
      description: |
        Lets a signed-in user verify their phone actually pops up an OS-level
        notification. Sends to every subscription endpoint registered for the
        caller. Per-user rate limited so a misbehaving client cannot spam
        their own devices.
      responses:
        "200":
          description: Test push dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushTestResult"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User has no push subscriptions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin statistics
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/outbound-clicks/stats:
    get:
      operationId: getOutboundClickStats
      tags: [admin]
      summary: Aggregated counts of sponsor / partner outbound link clicks
      parameters:
        - name: days
          in: query
          description: Window size for the "recent" totals. Defaults to 30. Clamped 1..365.
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Outbound click stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutboundClickStats"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/outbound-click:
    post:
      operationId: recordOutboundClick
      tags: [events]
      summary: Record a sponsor / partner outbound link click
      description: |
        Fire-and-forget telemetry. Auth is optional — most surfaces are
        reachable while signed out (splash, landing). Always returns 204
        even when validation rejects the body so a malformed beacon never
        blocks the user's outbound navigation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutboundClickBody"
      responses:
        "204":
          description: Recorded (or silently dropped)

  /admin/analyses:
    get:
      operationId: getAllAnalyses
      tags: [admin]
      summary: Get all analyses (admin only)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: All analyses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysesList"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/feedback:
    get:
      operationId: getAdminFeedback
      tags: [admin]
      summary: List user feedback rows (admin only)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: search
          in: query
          description: Free-text ILIKE filter matched against the user's email or the analysis instrument
          schema:
            type: string
        - name: feedbackType
          in: query
          description: Restrict to a single feedback reaction
          schema:
            type: string
            enum: [useful, not_useful]
        - name: from
          in: query
          description: Only include feedback created on or after this date (ISO 8601 date)
          schema:
            type: string
            format: date
        - name: to
          in: query
          description: Only include feedback created on or before this date (ISO 8601 date, inclusive end-of-day)
          schema:
            type: string
            format: date
        - name: analysisId
          in: query
          description: When set, only return feedback for the given analysis id.
          schema:
            type: integer
      responses:
        "200":
          description: Feedback rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminFeedbackList"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/notifications:
    post:
      operationId: broadcastNotification
      tags: [admin]
      summary: Broadcast notification to selected audience
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastNotificationBody"
      responses:
        "201":
          description: Notification sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastSendResult"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/broadcasts:
    get:
      operationId: getBroadcasts
      tags: [admin]
      summary: Broadcast history
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Broadcast history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastsList"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /superadmin/users:
    get:
      operationId: getAllUsers
      tags: [superadmin]
      summary: Get all users (superadmin only)
      parameters:
        - name: search
          in: query
          description: ILIKE filter on email or display name
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersList"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createUser
      tags: [superadmin]
      summary: Create new user (superadmin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /superadmin/users/{id}:
    delete:
      operationId: deleteUser
      tags: [superadmin]
      summary: Delete user (superadmin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /superadmin/users/{id}/password:
    patch:
      operationId: resetUserPassword
      tags: [superadmin]
      summary: Reset user password (superadmin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetUserPasswordBody"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /superadmin/tags:
    get:
      operationId: getAllTags
      tags: [superadmin]
      summary: List all distinct tags assigned to users
      responses:
        "200":
          description: Tag list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagsList"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /superadmin/users/{id}/tags:
    get:
      operationId: getUserTags
      tags: [superadmin]
      summary: Get all tags for a specific user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User's tag list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagsList"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addUserTag
      tags: [superadmin]
      summary: Add a tag to a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddUserTagBody"
      responses:
        "200":
          description: Updated tag list for user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagsList"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /superadmin/users/{id}/tags/{tag}:
    delete:
      operationId: removeUserTag
      tags: [superadmin]
      summary: Remove a tag from a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: tag
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated tag list for user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagsList"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /superadmin/users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [superadmin]
      summary: Update user role (superadmin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRoleBody"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    PushPublicKey:
      type: object
      properties:
        publicKey:
          type: string
      required:
        - publicKey

    PushSubscriptionKeys:
      type: object
      properties:
        p256dh:
          type: string
        auth:
          type: string
      required:
        - p256dh
        - auth

    PushSubscriptionBody:
      type: object
      properties:
        endpoint:
          type: string
          format: uri
        keys:
          $ref: "#/components/schemas/PushSubscriptionKeys"
      required:
        - endpoint
        - keys

    PushUnsubscribeBody:
      type: object
      properties:
        endpoint:
          type: string
          format: uri
      required:
        - endpoint

    PushSubscriptionStatus:
      type: object
      properties:
        subscribed:
          type: boolean
      required:
        - subscribed

    PushPrefs:
      type: object
      properties:
        pushExpiry:
          type: boolean
        pushBroadcast:
          type: boolean
      required:
        - pushExpiry
        - pushBroadcast

    PushTestResult:
      type: object
      properties:
        delivered:
          type: integer
          description: Number of subscription endpoints the test push was dispatched to
      required:
        - delivered

    PushPrefsUpdate:
      type: object
      properties:
        pushExpiry:
          type: boolean
        pushBroadcast:
          type: boolean

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [user, admin, super_admin]
        selectedMode:
          type: string
          enum: [beginner, pro]
        themePreference:
          type: string
          enum: [light, dark]
        securityQuestion:
          type: string
        onboardingCompleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - displayName
        - role
        - selectedMode
        - themePreference
        - onboardingCompleted
        - createdAt

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required:
        - user
        - message

    RegisterBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        displayName:
          type: string
        selectedMode:
          type: string
          enum: [beginner, pro]
          default: beginner
        securityQuestion:
          type: string
        securityAnswer:
          type: string
        rememberMe:
          type: boolean
          default: false
      required:
        - email
        - password
        - displayName
        - securityQuestion
        - securityAnswer

    LoginBody:
      type: object
      properties:
        email:
          type: string
          description: Username or email used to identify the account
        password:
          type: string
        rememberMe:
          type: boolean
          default: false
      required:
        - email
        - password

    ForgotPasswordQuestionBody:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    SecurityQuestionResponse:
      type: object
      properties:
        securityQuestion:
          type: string
        email:
          type: string
      required:
        - securityQuestion
        - email

    VerifySecurityAnswerBody:
      type: object
      properties:
        email:
          type: string
          format: email
        securityAnswer:
          type: string
      required:
        - email
        - securityAnswer

    ResetTokenResponse:
      type: object
      properties:
        resetToken:
          type: string
        message:
          type: string
      required:
        - resetToken
        - message

    ResetPasswordBody:
      type: object
      properties:
        resetToken:
          type: string
        newPassword:
          type: string
          minLength: 6
      required:
        - resetToken
        - newPassword

    UpdateProfileBody:
      type: object
      properties:
        displayName:
          type: string
        selectedMode:
          type: string
          enum: [beginner, pro]
        themePreference:
          type: string
          enum: [light, dark]
        onboardingCompleted:
          type: boolean

    ChangePasswordBody:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 6
      required:
        - currentPassword
        - newPassword

    ChangeSecurityQuestionBody:
      type: object
      properties:
        currentPassword:
          type: string
        securityQuestion:
          type: string
        securityAnswer:
          type: string
      required:
        - currentPassword
        - securityQuestion
        - securityAnswer

    TradeSide:
      type: object
      description: "One side (buy or sell) of the AI-suggested trade plan with concrete price levels. Levels are strings so the AI can return either numeric prices (e.g. '1.0857') or descriptive placeholders (e.g. 'menunggu konfirmasi level kunci') when no anchor price is available."
      properties:
        entryZone:
          type: string
        stopLoss:
          type: string
        takeProfit1:
          type: string
        takeProfit2:
          type: string
        riskRewardRatio:
          type: string
        rationale:
          type: string
      required:
        - entryZone
        - stopLoss
        - takeProfit1
        - takeProfit2
        - riskRewardRatio
        - rationale

    TradePlan:
      type: object
      description: "Structured trade plan with both buy and sell side levels suggested by the AI. preferredSide indicates which side aligns with the trading bias; 'wait' means neither side is recommended yet (e.g. neutral bias or pending high-impact event)."
      properties:
        preferredSide:
          type: string
          enum: [buy, sell, wait]
        buy:
          $ref: "#/components/schemas/TradeSide"
        sell:
          $ref: "#/components/schemas/TradeSide"
      required:
        - preferredSide
        - buy
        - sell

    FundamentalNewsItem:
      type: object
      description: "A single news headline included in the fundamental snapshot persisted on an analysis row. Captured from Newsmaker.id and Yahoo Finance RSS at analysis time."
      properties:
        id:
          type: string
        title:
          type: string
        summary:
          type: string
        source:
          type: string
          description: "Human-readable source label, e.g. 'Newsmaker.id' or 'Yahoo Finance'."
        url:
          type: string
          nullable: true
        publishedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - summary
        - source
        - url
        - publishedAt

    FundamentalCalendarEvent:
      type: object
      description: "A single economic-calendar event included in the fundamental snapshot persisted on an analysis row."
      properties:
        date:
          type: string
        time:
          type: string
          nullable: true
        currency:
          type: string
        event:
          type: string
        impact:
          type: string
          nullable: true
          description: "Star-rating string from the upstream feed: ★, ★★ or ★★★. Null when impact is unknown."
        actual:
          type: string
          nullable: true
        forecast:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
      required:
        - date
        - time
        - currency
        - event
        - impact
        - actual
        - forecast
        - previous

    FundamentalContext:
      type: object
      description: "Snapshot of fundamental inputs the AI saw at analysis time."
      properties:
        newsItems:
          type: array
          items:
            $ref: "#/components/schemas/FundamentalNewsItem"
        calendarEvents:
          type: array
          items:
            $ref: "#/components/schemas/FundamentalCalendarEvent"
      required:
        - newsItems
        - calendarEvents

    FundamentalDriftCitation:
      type: object
      description: "A single original AI citation that no longer matches anything in the freshly-fetched news/calendar window."
      properties:
        kind:
          type: string
          enum: [news, calendar]
        label:
          type: string
      required:
        - kind
        - label

    FundamentalDrift:
      type: object
      description: "Summary of how many of the AI's original fundamental citations are no longer present in the freshly-fetched window."
      properties:
        totalCitations:
          type: integer
          description: "Total citations the AI emitted at analysis time (newsTitles + calendarEvents)."
        missingCitations:
          type: array
          description: "Original citations that no longer match any item in the fresh snapshot."
          items:
            $ref: "#/components/schemas/FundamentalDriftCitation"
      required:
        - totalCitations
        - missingCitations

    RefreshFundamentalsResponse:
      type: object
      description: "Response from POST /analyses/{id}/refresh-fundamentals — the freshly-fetched fundamental snapshot plus a drift report against the AI's original citations."
      properties:
        fundamentalContext:
          $ref: "#/components/schemas/FundamentalContext"
        refreshedAt:
          type: string
          format: date-time
          description: "Server-side timestamp at which the fresh snapshot was captured. Used by the UI to render the 'updated N minutes ago' banner."
        drift:
          $ref: "#/components/schemas/FundamentalDrift"
      required:
        - fundamentalContext
        - refreshedAt
        - drift

    FundamentalCitations:
      type: object
      description: "Provenance trail emitted by the AI: the news headlines + economic-calendar event names it actually leaned on while writing the narrative. Lets the UI inline-cite the cards next to the relevant sentence (task #89)."
      properties:
        newsTitles:
          type: array
          items:
            type: string
          description: "News headlines the AI cited (matched against the snapshot in fundamentalContext.newsItems)."
        calendarEvents:
          type: array
          items:
            type: string
          description: "Calendar event names the AI cited (matched against the snapshot in fundamentalContext.calendarEvents)."
      required:
        - newsTitles
        - calendarEvents

    Analysis:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        instrument:
          type: string
        timeframe:
          type: string
        userInputContext:
          type: string
          nullable: true
        mode:
          type: string
          enum: [beginner, pro]
        validUntil:
          type: string
          format: date-time
        marketCondition:
          type: string
          nullable: true
        riskLevel:
          type: string
          nullable: true
        confidenceMin:
          type: integer
          nullable: true
        confidenceMax:
          type: integer
          nullable: true
        mainScenario:
          type: string
          nullable: true
        alternativeScenario:
          type: string
          nullable: true
        whyReason:
          type: string
          nullable: true
        failureConditions:
          type: string
          nullable: true
        baseCase:
          type: string
          nullable: true
        bullishScenario:
          type: string
          nullable: true
        bearishScenario:
          type: string
          nullable: true
        keyDriversTechnical:
          type: string
          nullable: true
        keyDriversFundamental:
          type: string
          nullable: true
        marketContext:
          type: string
          nullable: true
        invalidationConditions:
          type: string
          nullable: true
        uncertaintyNotes:
          type: string
          nullable: true
        tradingBias:
          type: string
          nullable: true
          description: "Directional bias. One of: bearish_strong, bearish, neutral, bullish, bullish_strong. Legacy values (strong_sell, sell, buy, strong_buy) may exist on older rows and are normalized client-side."
        opportunity:
          type: string
          nullable: true
        risk:
          type: string
          nullable: true
        techBuyCount:
          type: integer
          nullable: true
          description: "Snapshot of the technical-indicator buy tally captured at analysis time. Used to render the same Market Context Summary on the saved analysis page."
        techSellCount:
          type: integer
          nullable: true
          description: "Snapshot of the technical-indicator sell tally captured at analysis time."
        techNeutralCount:
          type: integer
          nullable: true
          description: "Snapshot of the technical-indicator neutral tally captured at analysis time."
        tradePlan:
          $ref: "#/components/schemas/TradePlan"
          nullable: true
          description: "Structured trade plan with concrete buy and sell entry/SL/TP levels generated by the AI and anchored to the latest closing price. Nullable for legacy rows or when no anchor price was available."
        fundamentalContext:
          $ref: "#/components/schemas/FundamentalContext"
          nullable: true
          description: "Snapshot of the news headlines + economic-calendar events the AI saw when this analysis was generated. Lets the saved-analysis page render the same fundamental context the model used. Nullable for legacy rows or when both upstream feeds were down."
        fundamentalCitations:
          $ref: "#/components/schemas/FundamentalCitations"
          nullable: true
          description: "Which news headlines + calendar events the AI actually cited in its narrative. Drives the inline source chips next to the AI's reasoning blocks (whyReason / keyDriversFundamental / marketContext). Nullable for legacy rows + analyses where the AI didn't lean on any fundamental input."
        outcomeStatus:
          type: string
          enum: [pending, tp1_hit, tp2_hit, sl_hit, expired, invalidated]
          description: "After-the-fact resolution of the AI's trade plan. `pending` until the background resolver finishes scoring it; `tp1_hit`/`tp2_hit` if price reached the corresponding take-profit; `sl_hit` if the stop-loss was touched first; `expired` if the validity window passed with no trigger touched; `invalidated` when the plan levels were unparseable or internally inconsistent."
        outcomeResolvedAt:
          type: string
          format: date-time
          nullable: true
          description: "Timestamp the trigger (SL/TP1/TP2) fired on, or the validity-window end for `expired`. Null while outcomeStatus is `pending`."
        outcomeCheckedAt:
          type: string
          format: date-time
          nullable: true
          description: "When the background resolver last looked at this row. Null until the first resolver pass touches it."
        feedback:
          $ref: "#/components/schemas/Feedback"
          nullable: true
        usefulCount:
          type: integer
          description: Number of "useful" feedback rows for this analysis. Only populated by admin endpoints.
        notUsefulCount:
          type: integer
          description: Number of "not_useful" feedback rows for this analysis. Only populated by admin endpoints.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - instrument
        - timeframe
        - mode
        - validUntil
        - createdAt

    AnalysesList:
      type: object
      properties:
        analyses:
          type: array
          items:
            $ref: "#/components/schemas/Analysis"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - analyses
        - total
        - page
        - limit

    CreateAnalysisBody:
      type: object
      properties:
        instrument:
          type: string
        timeframe:
          type: string
          enum: [1m, 5m, 15m, 30m, 1h, 4h, 1D, 1W]
        userInputContext:
          type: string
        mode:
          type: string
          enum: [beginner, pro]
      required:
        - instrument
        - timeframe
        - mode

    AnalysesSummary:
      type: object
      properties:
        totalAnalyses:
          type: integer
        beginnerCount:
          type: integer
        proCount:
          type: integer
        avgConfidenceMin:
          type: number
          nullable: true
        avgConfidenceMax:
          type: number
          nullable: true
        recentAnalyses:
          type: array
          items:
            $ref: "#/components/schemas/Analysis"
      required:
        - totalAnalyses
        - beginnerCount
        - proCount
        - recentAnalyses

    AnalysisOutcomesSummary:
      type: object
      description: "Outcome roll-up powering the dashboard's AI accuracy card. Counts every analysis created in the last `rangeDays` days; `scored` is the resolved + non-invalidated subset that the hit-rate percentages are computed against."
      properties:
        rangeDays:
          type: integer
        total:
          type: integer
        pending:
          type: integer
        tp1Hit:
          type: integer
        tp2Hit:
          type: integer
        slHit:
          type: integer
        expired:
          type: integer
        invalidated:
          type: integer
        scored:
          type: integer
          description: "Denominator used for tpHitRate / slHitRate. Equals tp1Hit + tp2Hit + slHit + expired (excludes pending and invalidated)."
        tpHitRate:
          type: number
          nullable: true
          description: "(tp1Hit + tp2Hit) / scored. Null when scored == 0."
        slHitRate:
          type: number
          nullable: true
          description: "slHit / scored. Null when scored == 0."
      required:
        - rangeDays
        - total
        - pending
        - tp1Hit
        - tp2Hit
        - slHit
        - expired
        - invalidated
        - scored

    RecentInstruments:
      type: object
      properties:
        instruments:
          type: array
          items:
            type: object
            properties:
              instrument:
                type: string
              lastAnalyzedAt:
                type: string
                format: date-time
              mode:
                type: string
            required:
              - instrument
              - lastAnalyzedAt
              - mode
      required:
        - instruments

    AnalysisQuota:
      type: object
      properties:
        unlimited:
          type: boolean
          description: True for admin/super_admin, who bypass quota
        hourly:
          type: object
          properties:
            limit:
              type: integer
            used:
              type: integer
            remaining:
              type: integer
          required: [limit, used, remaining]
        daily:
          type: object
          properties:
            limit:
              type: integer
            used:
              type: integer
            remaining:
              type: integer
          required: [limit, used, remaining]
      required: [unlimited, hourly, daily]

    PersonalAnalytics:
      type: object
      properties:
        totalAllTime:
          type: integer
        totalThisMonth:
          type: integer
        totalThisWeek:
          type: integer
        topInstruments:
          type: array
          items:
            type: object
            properties:
              instrument:
                type: string
              count:
                type: integer
            required:
              - instrument
              - count
        dominantMode:
          type: string
          nullable: true
        accuracyRate:
          type: number
          nullable: true
        feedbackCount:
          type: integer
        weeklyData:
          type: array
          items:
            type: object
            properties:
              week:
                type: string
              count:
                type: integer
            required:
              - week
              - count
      required:
        - totalAllTime
        - totalThisMonth
        - totalThisWeek
        - topInstruments
        - feedbackCount
        - weeklyData

    Feedback:
      type: object
      properties:
        id:
          type: integer
        analysisId:
          type: integer
        feedbackType:
          type: string
          enum: [useful, not_useful]
        outcome:
          type: string
          enum: [correct, wrong, unknown]
          nullable: true
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - analysisId
        - feedbackType
        - createdAt

    FeedbackWithDetails:
      type: object
      properties:
        id:
          type: integer
