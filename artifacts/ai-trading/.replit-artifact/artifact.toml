kind = "web"
previewPath = "/"
title = "AI Trading Assistant"
version = "1.0.0"
id = "artifacts/ai-trading"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20853

[services.development]
run = "pnpm --filter @workspace/ai-trading run dev"

# NOTE: ai-trading has NO production service. In production the
# ai-trading SPA is built by the api-server's production build step
# and served by the api-server itself (Express static + SPA fallback)
# so the whole app runs as a single Cloud Run service on one port.

[services.env]
PORT = "20853"
BASE_PATH = "/"
