kind = "web"
previewPath = "/"
title = "AI Trading Assistant"
version = "1.0.0"
id = "artifacts/ai-trading"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20853

[services.development]
run = "pnpm --filter @workspace/ai-trading run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-trading", "run", "build" ]
publicDir = "artifacts/ai-trading/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20853"
BASE_PATH = "/"
