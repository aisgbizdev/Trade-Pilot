kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

# Production build: push the current Drizzle schema to the production
# database FIRST (using DATABASE_URL injected by the deployment runner),
# then bundle the api-server. The ai-trading SPA builds itself in its
# own [services.production.build] (it's served as a static service by
# the workspace path-router, not by api-server).
[services.production.build]
args = [
  "sh",
  "-c",
  "pnpm --filter @workspace/db run push-force && pnpm --filter @workspace/api-server run build",
]

[services.production.build.env]
NODE_ENV = "production"
BASE_PATH = "/"
PORT = "8080"

[services.production.run]
# we don't run through pnpm to make startup faster in production
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

# NOTE: PORT="8080" matches Cloud Run's default container port and acts
# as the explicit signal the autoscale deployer uses to figure out which
# of the workspace's [[ports]] entries should be exposed publicly. Cloud
# Run still injects $PORT at runtime (also 8080 by default) and the
# api-server reads process.env.PORT, so this stays in sync. Removing
# this caused April 30 deploys to fail with "no run command provided"
# and "multiple ports forwarded" because the deployer fell back to the
# wrong artifact (mockup-sandbox, which owns externalPort=80 in the
# auto-generated [[ports]] block but has no production service).
[services.production.run.env]
NODE_ENV = "production"
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
