kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

# In production the api-server is the ONLY running service — it serves
# the API on /api/* via its Express router AND the ai-trading SPA on
# every other path via the static-file fallback in src/app.ts. The
# workspace's path-based proxy needs to know the api-server claims both
# /api and / so it has a backend to route the root URL to. Without "/"
# in this list, requests to https://<app>.replit.app/ get a synthetic
# 500 from the proxy because no production service owns "/" (ai-trading
# owns "/" but has no [services.production], so it can't serve prod).
# In dev, the previewPath ("/api") is the proxy's primary tiebreaker,
# so ai-trading's previewPath="/" still wins root traffic and dev HMR
# keeps working through the ai-trading vite dev server.
[[services]]
localPort = 8080
name = "API Server"
paths = ["/api", "/"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

# Production build: push the current Drizzle schema to the production
# database FIRST (using DATABASE_URL injected by the deployment runner),
# then build the ai-trading SPA, then bundle the api-server itself
# (which serves the SPA in production so we run as a single Cloud Run
# service on a single port).
[services.production.build]
args = [
  "sh",
  "-c",
  "pnpm --filter @workspace/db run push-force && pnpm --filter @workspace/ai-trading run build && pnpm --filter @workspace/api-server run build",
]

[services.production.build.env]
NODE_ENV = "production"
BASE_PATH = "/"
PORT = "8080"

[services.production.run]
# we don't run through pnpm to make startup faster in production
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

# NOTE: PORT="8080" matches Cloud Run's default container port and acts
# as the explicit signal the autoscale deployer uses to figure out which
# of the workspace's [[ports]] entries should be exposed publicly. Cloud
# Run still injects $PORT at runtime (also 8080 by default) and the
# api-server reads process.env.PORT, so this stays in sync. Removing
# this caused April 30 deploys to fail with "no run command provided"
# and "multiple ports forwarded" because the deployer fell back to the
# wrong artifact (mockup-sandbox, which owns externalPort=80 in the
# auto-generated [[ports]] block but has no production service).
[services.production.run.env]
NODE_ENV = "production"
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
